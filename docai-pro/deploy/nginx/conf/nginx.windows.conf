worker_processes auto;
worker_rlimit_nofile 65535;

events {
    # use epoll; # epoll is Linux-only; omit on Windows
    worker_connections 10000;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Container bridge mode on Windows: use host.docker.internal to access gateway process
    upstream docaigateway {
        server host.docker.internal:18080;
        keepalive 1000;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            root /data/docaidata/web/dist;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
            # 禁止所有静态资源缓存，确保始终加载最新版本
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /api/v1/ {
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_pass http://docaigateway;

            proxy_connect_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            proxy_buffering off;
            proxy_request_buffering off;

            add_header Cache-Control no-store;
            add_header Pragma no-cache;
        }
    }
}
