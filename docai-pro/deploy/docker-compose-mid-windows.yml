# Windows one-click stack: mysql + redis + nacos + nginx
services:
  docai-mysql:
    container_name: docai-mysql
    image: mysql:8.4.2
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - ../data/docaidata/mysql/data:/var/lib/mysql
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/sql:/opt/sql
    command:
      - mysqld
      - --innodb-buffer-pool-size=80M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
      - --lower-case-table-names=1
      - --explicit_defaults_for_timestamp=true
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-ignore-db=mysql
      - --binlog-cache-size=256M
      - --binlog-format=ROW
      - --max_connections=2000
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: Dairenwen1092
    restart: always
    networks:
      - docai_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pDairenwen1092"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

  docai-redis:
    container_name: docai-redis
    image: redis:7.0.15
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
      - ../data/docaidata/redis/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - docai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  docai-nacos:
    container_name: docai-nacos
    image: nacos/nacos-server:v2.2.2
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=docai-mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=docai_nacos
      - MYSQL_DATABASE_NUM=1
      - MYSQL_SERVICE_USER=drw
      - MYSQL_SERVICE_PASSWORD=dairenwen1092
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ../data/docaidata/nacos/logs/:/home/nacos/logs
      - ../data/docaidata/nacos/tomcatlogs/:/home/nacos/tomcat/logs/
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    depends_on:
      docai-mysql:
        condition: service_healthy
    restart: always
    networks:
      - docai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      start_period: 90s
      interval: 10s
      timeout: 10s
      retries: 20

  docai-web:
    image: nginx:1.24.0
    container_name: docai-web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/conf/nginx.windows.conf:/etc/nginx/nginx.conf
      - ./nginx/web/dist:/data/docaidata/web/dist
    depends_on:
      docai-nacos:
        condition: service_started
    restart: always
    networks:
      - docai_network

networks:
  docai_network:
