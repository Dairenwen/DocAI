services:
  docai-mysql:
    container_name: docai-mysql
    image: mysql:8.4.2
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Dairenwen1092}
    ports:
      - "3306:3306"
    command:
      - mysqld
      - --innodb-buffer-pool-size=80M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
      - --lower-case-table-names=1
      - --explicit_defaults_for_timestamp=true
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-ignore-db=mysql
      - --binlog-cache-size=256M
      - --binlog-format=ROW
      - --max_connections=2000
    volumes:
      - docai_mysql_data:/var/lib/mysql
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql/sql:/opt/sql:ro
    restart: always
    networks:
      - docai_network

  docai-redis:
    container_name: docai-redis
    image: redis:7.0.15
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - docai_redis_data:/data
    restart: always
    networks:
      - docai_network

  docai-nacos:
    container_name: docai-nacos
    image: nacos/nacos-server:v2.2.2
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=docai-mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=docai_nacos
      - MYSQL_DATABASE_NUM=1
      - MYSQL_SERVICE_USER=drw
      - MYSQL_SERVICE_PASSWORD=${MYSQL_APP_PASSWORD:-dairenwen1092}
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
    volumes:
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties:ro
      - docai_nacos_logs:/home/nacos/logs
      - docai_nacos_tomcat:/home/nacos/tomcat/logs
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - docai-mysql
    restart: always
    networks:
      - docai_network

  user-service:
    image: docai-backend:latest
    build:
      context: ../..
      dockerfile: docai-pro/Dockerfile.backend
    container_name: user-service
    environment:
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      APP_JAR: /app/user-service.jar
      APP_ARGS: >-
        --server.port=9001
        --spring.cloud.bootstrap.enabled=false
        --spring.cloud.nacos.config.enabled=false
        --spring.cloud.nacos.discovery.enabled=false
        --security.gateway.enabled=false
        --spring.redis.host=docai-redis
        --spring.redis.port=6379
        --spring.datasource.url=jdbc:mysql://docai-mysql:3306/docai?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=drw
        --spring.datasource.password=${MYSQL_APP_PASSWORD:-dairenwen1092}
        --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
        --spring.mail.host=${DOC_SMTP_HOST:-smtp.qq.com}
        --spring.mail.port=${DOC_SMTP_PORT:-587}
        --spring.mail.username=${DOC_SMTP_USER:-}
        --spring.mail.password=${DOC_SMTP_AUTH_CODE:-}
        --spring.mail.protocol=smtp
        --spring.mail.default-encoding=UTF-8
        --spring.mail.properties.mail.smtp.auth=true
        --spring.mail.properties.mail.smtp.starttls.enable=true
        --spring.mail.properties.mail.smtp.starttls.required=false
        --spring.mail.properties.mail.smtp.ssl.trust=*
        --aliyun.oss.end-point=${DOC_OSS_ENDPOINT:-}
        --aliyun.oss.bucket-name=${DOC_OSS_BUCKET:-}
        --aliyun.oss.access-key-id=${DOC_OSS_ACCESS_KEY_ID:-}
        --aliyun.oss.access-key-secret=${DOC_OSS_ACCESS_KEY_SECRET:-}
    depends_on:
      - docai-mysql
      - docai-redis
      - docai-nacos
    ports:
      - "9001:9001"
    restart: always
    networks:
      - docai_network

  file-service:
    image: docai-backend:latest
    build:
      context: ../..
      dockerfile: docai-pro/Dockerfile.backend
    container_name: file-service
    environment:
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      APP_JAR: /app/file-service.jar
      APP_ARGS: >-
        --server.port=9003
        --spring.cloud.bootstrap.enabled=false
        --spring.cloud.nacos.config.enabled=false
        --spring.cloud.nacos.discovery.enabled=false
        --security.gateway.enabled=false
        --spring.redis.host=docai-redis
        --spring.redis.port=6379
        --spring.datasource.url=jdbc:mysql://docai-mysql:3306/docai?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=drw
        --spring.datasource.password=${MYSQL_APP_PASSWORD:-dairenwen1092}
        --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
        --spring.servlet.multipart.max-file-size=200MB
        --spring.servlet.multipart.max-request-size=200MB
        --aliyun.oss.end-point=${DOC_OSS_ENDPOINT:-}
        --aliyun.oss.bucket-name=${DOC_OSS_BUCKET:-}
        --aliyun.oss.access-key-id=${DOC_OSS_ACCESS_KEY_ID:-}
        --aliyun.oss.access-key-secret=${DOC_OSS_ACCESS_KEY_SECRET:-}
    depends_on:
      - docai-mysql
      - docai-redis
      - docai-nacos
    ports:
      - "9003:9003"
    restart: always
    networks:
      - docai_network

  ai-service:
    image: docai-backend:latest
    build:
      context: ../..
      dockerfile: docai-pro/Dockerfile.backend
    container_name: ai-service
    environment:
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      APP_JAR: /app/ai-service.jar
      APP_ARGS: >-
        --server.port=9002
        --spring.cloud.bootstrap.enabled=false
        --spring.cloud.nacos.config.enabled=false
        --spring.cloud.nacos.discovery.enabled=false
        --security.gateway.enabled=false
        --spring.redis.host=docai-redis
        --spring.redis.port=6379
        --spring.datasource.url=jdbc:mysql://docai-mysql:3306/docai?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=drw
        --spring.datasource.password=${MYSQL_APP_PASSWORD:-dairenwen1092}
        --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
        --spring.servlet.multipart.max-file-size=200MB
        --spring.servlet.multipart.max-request-size=200MB
        --spring.ai.default-provider=dashscope
        --spring.ai.dashscope.api-key=${DOC_DASHSCOPE_API_KEY}
        --spring.ai.dashscope.chat.api-key=${DOC_DASHSCOPE_API_KEY}
        --spring.ai.dashscope.chat.options.model=qwen-plus
        --spring.ai.alibaba.dashscope.api-key=${DOC_DASHSCOPE_API_KEY}
        --spring.ai.alibaba.dashscope.chat.options.model=qwen-plus
        --spring.ai.alibaba.dashscope.chat.options.temperature=0.7
        --spring.ai.alibaba.dashscope.chat.options.max-tokens=8192
        --spring.ai.alibaba.dashscope.http.connect-timeout=60000
        --spring.ai.alibaba.dashscope.http.read-timeout=300000
        --spring.ai.alibaba.dashscope.http.write-timeout=60000
        --spring.ai.deepseek.api-key=${DOC_DEEPSEEK_API_KEY}
        --spring.ai.deepseek.base-url=https://api.deepseek.com
        --spring.ai.deepseek.chat.options.model=deepseek-chat
        --spring.ai.deepseek.chat.options.temperature=0.7
        --spring.ai.deepseek.chat.options.max-tokens=8192
        --spring.ai.deepseek.http.connect-timeout=60000
        --spring.ai.deepseek.http.read-timeout=300000
        --spring.ai.deepseek.http.write-timeout=60000
        --spring.mail.host=${DOC_SMTP_HOST:-smtp.qq.com}
        --spring.mail.port=${DOC_SMTP_PORT:-587}
        --spring.mail.username=${DOC_SMTP_USER:-}
        --spring.mail.password=${DOC_SMTP_AUTH_CODE:-}
        --spring.mail.protocol=smtp
        --spring.mail.default-encoding=UTF-8
        --spring.mail.properties.mail.smtp.auth=true
        --spring.mail.properties.mail.smtp.starttls.enable=true
        --spring.mail.properties.mail.smtp.starttls.required=false
        --spring.mail.properties.mail.smtp.ssl.trust=*
        --aliyun.oss.end-point=${DOC_OSS_ENDPOINT:-}
        --aliyun.oss.bucket-name=${DOC_OSS_BUCKET:-}
        --aliyun.oss.access-key-id=${DOC_OSS_ACCESS_KEY_ID:-}
        --aliyun.oss.access-key-secret=${DOC_OSS_ACCESS_KEY_SECRET:-}
    depends_on:
      - docai-mysql
      - docai-redis
      - docai-nacos
    ports:
      - "9002:9002"
    restart: always
    networks:
      - docai_network

  gateway-service:
    image: docai-backend:latest
    build:
      context: ../..
      dockerfile: docai-pro/Dockerfile.backend
    container_name: gateway-service
    environment:
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      APP_JAR: /app/gateway-service.jar
      APP_ARGS: >-
        --server.port=18080
        --spring.cloud.bootstrap.enabled=false
        --spring.cloud.nacos.config.enabled=false
        --spring.cloud.nacos.discovery.enabled=false
        --spring.codec.max-in-memory-size=200MB
        --spring.cloud.gateway.httpclient.response-timeout=300s
        --spring.cloud.gateway.httpclient.connect-timeout=10000
        --spring.cloud.gateway.routes[0].id=user-service
        --spring.cloud.gateway.routes[0].uri=http://user-service:9001
        --spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**
        --spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2
        --spring.cloud.gateway.routes[1].id=file-service
        --spring.cloud.gateway.routes[1].uri=http://file-service:9003
        --spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/files/**
        --spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2
        --spring.cloud.gateway.routes[2].id=ai-service-1
        --spring.cloud.gateway.routes[2].uri=http://ai-service:9002
        --spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/ai/**
        --spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2
        --spring.cloud.gateway.routes[3].id=ai-service-2
        --spring.cloud.gateway.routes[3].uri=http://ai-service:9002
        --spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/llm/**
        --spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2
        --spring.cloud.gateway.routes[4].id=ai-service-3
        --spring.cloud.gateway.routes[4].uri=http://ai-service:9002
        --spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/source/**
        --spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2
        --spring.cloud.gateway.routes[5].id=ai-service-4
        --spring.cloud.gateway.routes[5].uri=http://ai-service:9002
        --spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/template/**
        --spring.cloud.gateway.routes[5].filters[0]=StripPrefix=2
    depends_on:
      - user-service
      - file-service
      - ai-service
    ports:
      - "18080:18080"
    restart: always
    networks:
      - docai_network

  docai-web:
    image: docai-frontend:latest
    build:
      context: ../..
      dockerfile: docai-pro/Dockerfile.frontend
    container_name: docai-web
    depends_on:
      - gateway-service
    ports:
      - "8080:8080"
    restart: always
    networks:
      - docai_network

volumes:
  docai_mysql_data:
  docai_redis_data:
  docai_nacos_logs:
  docai_nacos_tomcat:

networks:
  docai_network:
