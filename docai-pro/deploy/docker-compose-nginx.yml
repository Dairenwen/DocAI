version: '3.8'
#启动命令 docker compose -p docai -f docker-compose-nginx.yml up -d
services:
  docai-web:
    image: nginx:1.24.0
    container_name: docai-web
    restart: always
    network_mode: host
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/web/dist:/data/docaidata/web/dist
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
networks:
  docai_network: